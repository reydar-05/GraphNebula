global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI backend — exposes /metrics via prometheus-fastapi-instrumentator
  - job_name: "graphnebula-backend"
    static_configs:
      - targets: ["backend-svc:8000"]
    metrics_path: /metrics

  # Celery workers — via celery-exporter sidecar
  - job_name: "celery-workers"
    static_configs:
      - targets: ["celery-exporter-svc:9808"]

  # PostgreSQL — via postgres_exporter
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter-svc:9187"]

  # Redis — via redis_exporter
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter-svc:9121"]

  # Kubernetes node/pod metrics
  - job_name: "kubernetes-pods"
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace]
        regex: graphnebula
        action: keep
