# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: Never commit real secrets to git.
# Populate with: kubectl create secret generic graphnebula-secrets \
#   --from-env-file=.env -n graphnebula
# OR use an external secrets operator (External Secrets / Sealed Secrets).
#
# This file shows the expected keys only — values are base64 placeholders.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: graphnebula-secrets
  namespace: graphnebula
type: Opaque
stringData:
  DATABASE_URL: "postgresql://graphuser:CHANGE_ME@postgres-svc:5432/graphdb"
  POSTGRES_USER: "graphuser"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "graphdb"
  NEO4J_URI: "bolt://neo4j-svc:7687"
  NEO4J_PASSWORD: "CHANGE_ME"
  NEO4J_AUTH: "neo4j/CHANGE_ME"
  REDIS_HOST: "redis-svc"
  REDIS_URL: "redis://redis-svc:6379/0"
  ALLOWED_ORIGINS: "https://your-production-domain.com"
